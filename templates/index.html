<!DOCTYPE html>
<html>
<head>
    <title>AI Background Remover</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex flex-col items-center justify-center min-h-screen">
    <h1 class="text-3xl font-bold mb-6">AI Background Remover</h1>

    <form id="upload-form" method="POST" enctype="multipart/form-data" class="bg-gray-800 p-6 rounded-lg shadow-lg w-96 flex flex-col items-center">
        {% csrf_token %}
        <label class="w-full h-32 border-4 border-dashed border-gray-500 flex flex-col items-center justify-center cursor-pointer hover:border-green-400">
            <span>Drag & Drop or Click to Upload</span>
            <input type="file" name="image" class="hidden" required>
        </label>
        <button type="submit" class="mt-4 bg-green-500 text-black px-6 py-2 rounded hover:bg-green-600">Upload & Remove BG</button>
    </form>

    <div id="loader" class="hidden mt-4">Processing...</div>

    <script>
        const form = document.getElementById('upload-form');
        const loader = document.getElementById('loader');
        form.addEventListener('submit', () => { loader.classList.remove('hidden'); });
    </script>
</body>
</html>
