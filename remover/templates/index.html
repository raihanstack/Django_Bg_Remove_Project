<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rs bg eraser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            /* Animated gradient background */
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .upload-zone {
            transition: all 0.3s ease;
        }
        
        .upload-zone:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #60a5fa; /* Tailwind blue-400 */
            transform: translateY(-2px);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn-gradient:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }

        /* Spinner Animation */
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        .spinner {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body class="text-white flex flex-col items-center justify-center min-h-screen">
    <div class="z-10 text-center mb-8">
        <h1 class="text-5xl font-extrabold mb-4 tracking-tight drop-shadow-lg text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">RS BG Eraser</h1>
        <p class="text-gray-300 text-lg">Effortlessly remove backgrounds from your images in seconds.</p>
    </div>

    <form id="upload-form" method="POST" enctype="multipart/form-data" class="glass-card p-10 rounded-2xl w-full max-w-lg flex flex-col items-center relative z-10 transition-all">
        {% csrf_token %}
        <label for="file-upload" class="upload-zone w-full h-48 border-2 border-dashed border-gray-400 rounded-xl flex flex-col items-center justify-center cursor-pointer group mb-6 relative p-2">
            <div id="upload-content" class="flex flex-col items-center justify-center w-full h-full transition-opacity duration-300">
                <svg class="w-12 h-12 text-gray-400 group-hover:text-blue-400 transition-colors duration-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                </svg>
                <span class="text-gray-300 font-medium group-hover:text-white transition-colors">Drag & Drop or Click to Upload</span>
                <span class="text-sm text-gray-500 mt-2" id="file-name">Multiple formats supported</span>
            </div>
            <img id="image-preview" src="" class="hidden w-full h-full object-contain absolute inset-0 m-auto z-10 rounded-lg pointer-events-none" />
            <input id="file-upload" type="file" name="image" class="hidden" accept="image/*" required>
        </label>
        
        <button type="submit" class="btn-gradient w-full text-white font-semibold flex items-center justify-center gap-2 px-8 py-4 rounded-xl text-lg relative overflow-hidden">
            <span>Upload & Remove BG</span>
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        </button>
        
        <!-- Loading overlay -->
        <div id="loader" class="absolute inset-0 bg-gray-900 bg-opacity-80 rounded-2xl flex flex-col items-center justify-center hidden z-20 backdrop-blur-sm">
            <svg class="spinner w-12 h-12 text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span class="text-blue-300 font-semibold tracking-wider">Processing...</span>
        </div>
    </form>

    <script>
        const form = document.getElementById('upload-form');
        const loader = document.getElementById('loader');
        const fileInput = document.getElementById('file-upload');
        const fileNameDisplay = document.getElementById('file-name');

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                const file = e.target.files[0];
                fileNameDisplay.textContent = file.name;
                fileNameDisplay.classList.add('text-blue-300');
                fileNameDisplay.classList.remove('text-gray-500');

                const reader = new FileReader();
                reader.onload = function(event) {
                    const imgPreview = document.getElementById('image-preview');
                    const uploadContent = document.getElementById('upload-content');
                    
                    imgPreview.src = event.target.result;
                    imgPreview.classList.remove('hidden');
                    uploadContent.style.opacity = '0';
                    setTimeout(() => uploadContent.classList.add('hidden'), 300);
                }
                reader.readAsDataURL(file);
            }
        });

        form.addEventListener('submit', () => { 
            loader.classList.remove('hidden'); 
        });
    </script>
</body>
</html>
