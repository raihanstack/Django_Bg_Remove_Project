<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result - RS BG Eraser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0B0F19; /* Deep dark background */
            color: #FFFFFF;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.5;
            animation: float 10s infinite ease-in-out alternate;
        }
        .orb-1 { width: 500px; height: 500px; background: #10B981; top: -150px; right: -150px; }
        .orb-2 { width: 400px; height: 400px; background: #3B82F6; bottom: -100px; left: -100px; animation-delay: -3s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-30px, 30px) scale(1.05); }
        }

        .glass-panel {
            background: rgba(17, 24, 39, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 60px -15px rgba(0, 0, 0, 0.6);
            border-radius: 1.5rem;
        }

        .btn-download {
            background: linear-gradient(135deg, #10B981, #059669);
            transition: all 0.3s ease;
        }
        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.5);
        }

        .btn-outline {
            background: rgba(255,255,255, 0.05);
            border: 1px solid rgba(255,255,255, 0.1);
            transition: all 0.3s ease;
        }
        .btn-outline:hover {
            background: rgba(255,255,255, 0.1);
            transform: translateY(-2px);
            border-color: rgba(255,255,255, 0.2);
        }

        .checkerboard-bg {
            background-image: 
                linear-gradient(45deg, rgba(255,255,255,0.05) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(255,255,255,0.05) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.05) 75%),
                linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.05) 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: rgba(17, 24, 39, 0.6);
        }
    </style>
</head>
<body class="relative">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <nav class="relative z-10 w-full py-6 px-8 flex justify-between items-center max-w-7xl mx-auto">
        <a href="/" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-pink-500 flex items-center justify-center shadow-lg">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.121 14.121L19 19m-7-7l7-7m-7 7l-2.879-2.879M12 12L9.121 9.121m0 5.758a3 3 0 10-4.243-4.243 3 3 0 004.243 4.243z"></path></svg>
            </div>
            <span class="text-2xl font-bold tracking-wide">RS BG Eraser</span>
        </a>
    </nav>

    <main class="relative z-10 flex-grow flex items-center justify-center px-4 py-8">
        <div class="max-w-4xl w-full flex flex-col items-center">
            
            <div class="text-center mb-8">
                <span class="inline-block py-1 px-3 rounded-full bg-green-500 bg-opacity-20 text-green-400 text-sm font-semibold tracking-wider mb-4 border border-green-500 border-opacity-30">SUCCESS</span>
                <h2 class="text-4xl md:text-5xl font-black mb-3">Your Image is Ready</h2>
                <p class="text-gray-400 text-lg">The background has been extracted perfectly.</p>
            </div>

            <div class="glass-panel p-6 md:p-10 w-full flex flex-col items-center">
                <div class="checkerboard-bg w-full rounded-2xl overflow-hidden shadow-2xl mb-8 flex items-center justify-center border border-gray-700 min-h-[300px] relative group">
                    <img src="{{ img.output.url }}" class="max-w-full max-h-[60vh] object-contain transition-transform duration-700 group-hover:scale-105 z-10">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
                    <a href="{{ img.output.url }}" download class="btn-download text-white font-bold flex items-center justify-center gap-3 px-8 py-4 rounded-xl text-lg w-full">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        <span>Download HD Image</span>
                    </a>
                    <a href="/" class="btn-outline text-white font-bold flex items-center justify-center gap-3 px-8 py-4 rounded-xl text-lg w-full">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        <span>Process Another</span>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer class="relative z-10 w-full py-6 border-t border-gray-800 text-center mt-auto flex flex-col items-center gap-4">
        <div class="flex items-center justify-center gap-5">
            <!-- GitHub -->
            <a href="https://github.com/raihanstack" target="_blank" rel="noopener noreferrer" class="text-gray-500 hover:text-white hover:scale-110 transition-all duration-300">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"></path></svg>
            </a>
            <!-- LinkedIn -->
            <a href="https://linkedin.com/in/raihanstack" target="_blank" rel="noopener noreferrer" class="text-gray-500 hover:text-white hover:scale-110 transition-all duration-300">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" clip-rule="evenodd"></path></svg>
            </a>
            <!-- Facebook -->
            <a href="https://facebook.com/raihanstack" target="_blank" rel="noopener noreferrer" class="text-gray-500 hover:text-white hover:scale-110 transition-all duration-300">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z" clip-rule="evenodd"></path></svg>
            </a>
        </div>
        <p class="text-gray-500 text-sm font-medium">© 2026 raihanstack. Built with power and elegance.</p>
    </footer>
</body>
</html>
