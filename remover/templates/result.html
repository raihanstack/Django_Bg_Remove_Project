<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result - rs bg eraser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            /* Animated gradient background */
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #10b981, #059669); /* Emerald green gradient */
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn-gradient:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .image-container {
            background-image: repeating-linear-gradient(45deg, #1f2937 25%, transparent 25%, transparent 75%, #1f2937 75%, #1f2937), 
                              repeating-linear-gradient(45deg, #1f2937 25%, #111827 25%, #111827 75%, #1f2937 75%, #1f2937);
            background-position: 0 0, 10px 10px;
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="text-white flex flex-col items-center justify-center min-h-screen py-10">
    <div class="z-10 text-center mb-6">
        <h2 class="text-4xl font-extrabold mb-2 tracking-tight drop-shadow-lg text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-500">Magic Applied!</h2>
        <p class="text-gray-300">Your background has been successfully removed.</p>
    </div>

    <div class="glass-card p-8 rounded-2xl w-full max-w-2xl flex flex-col items-center relative z-10">
        <!-- Resulting Image with Checkerboard BG to show transparency -->
        <div class="image-container w-full rounded-xl overflow-hidden shadow-2xl mb-8 flex justify-center border-2 border-gray-700">
            <img src="{{ img.output.url }}" class="max-w-full h-auto max-h-[60vh] object-contain transition-transform duration-500 hover:scale-105">
        </div>

        <div class="flex flex-col sm:flex-row gap-4 w-full">
            <a href="{{ img.output.url }}" download class="btn-gradient flex-1 text-white font-semibold flex items-center justify-center gap-2 px-6 py-4 rounded-xl text-lg">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                <span>Download High-Res</span>
            </a>
            <a href="/" class="btn-secondary flex-1 text-white font-semibold flex items-center justify-center gap-2 px-6 py-4 rounded-xl text-lg">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <span>Upload Another</span>
            </a>
        </div>
    </div>
</body>
</html>
